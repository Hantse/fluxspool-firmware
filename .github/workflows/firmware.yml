name: Firmware Build & Upload

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base version (ex: 1.4)"
        required: true
        default: "1.4"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Generate version once ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version:   ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      full_sha:  ${{ steps.version.outputs.full_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          BASE="1.4"
          DATE=$(date -u +"%Y%m%d%H%M")
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          VERSION="$BASE.$DATE+$SHORT_SHA"

          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "full_sha=$FULL_SHA"   >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

  # ── 2. Build all envs in parallel ─────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [ gateway, probe, standalone ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware (${{ matrix.env }})
        run: |
          export FW_VERSION="${{ needs.prepare.outputs.version }}"
          pio run -e "${{ matrix.env }}"

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: .pio/build/${{ matrix.env }}/
          retention-days: 1

  # ── 3. Upload once, after all builds succeed ───────────────────────────────
  upload:
    needs: [ prepare, build ]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload Firmware (OTA + FULL)
        env:
          API_URL: ${{ secrets.FW_UPLOAD_URL }}
          API_KEY: ${{ secrets.FW_UPLOAD_KEY }}
        run: |
          set -euo pipefail

          API_URL_CLEAN="$(printf "%s" "$API_URL" | tr -d '\r\n\t ')"
          API_KEY_CLEAN="$(printf "%s" "$API_KEY" | tr -d '\r\n\t ')"

          if ! echo "$API_URL_CLEAN" | grep -Eq '^https?://'; then
            echo "❌ FW_UPLOAD_URL must start with http:// or https://"
            echo "Got URL length=${#API_URL_CLEAN}"
            exit 1
          fi

          COMMIT="${{ needs.prepare.outputs.full_sha }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          FINAL_URL="${API_URL_CLEAN}?commitId=${COMMIT}&apiKey=${API_KEY_CLEAN}"

          upload_one () {
            local BIN="$1"
            local KIND="$2"
            local BOARD="$3"

            if [ ! -f "$BIN" ]; then
              echo "Skip: $BIN not found"
              return 0
            fi

            local SHA SIZE
            SHA=$(sha256sum "$BIN" | awk '{print $1}')
            SIZE=$(stat -c%s "$BIN")

            echo "Uploading $BOARD/$KIND (version=$VERSION commit=$COMMIT)"
            curl -f -X POST "$FINAL_URL" \
              -H "Authorization: Bearer $API_KEY_CLEAN" \
              -F "file=@${BIN};type=application/octet-stream" \
              -F "kind=$KIND" \
              -F "version=$VERSION" \
              -F "board=$BOARD" \
              -F "sha256=$SHA" \
              -F "size=$SIZE"
          }

          for BOARD in gateway probe standalone; do
            DIR="artifacts/firmware-${BOARD}"
            upload_one "$DIR/firmware.bin"      "ota"  "$BOARD"
            upload_one "$DIR/full_firmware.bin" "full" "$BOARD"
          done
